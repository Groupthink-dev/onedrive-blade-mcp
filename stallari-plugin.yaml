name: onedrive-blade-mcp
version: "0.2.0"
description: "OneDrive & SharePoint file operations via Microsoft Graph API"
author: piersdd
license: MIT
tier: certified
homepage: https://github.com/groupthink-dev/onedrive-blade-mcp

# DD-181 Wave 2: drive-v1 (8 ops) was retired and replaced by file-storage-v1
# (14 ops, hierarchical file storage). Service slot also renamed drive →
# file_storage so it doesn't collide with authoritative DNS.
contract: file-storage-v1

services:
  file_storage:
    list: drive_list
    read: drive_read
    write: drive_upload
    delete: drive_delete
    get_metadata: drive_metadata
    folder_create: drive_create_folder
    move: drive_move
    search: drive_search
    changes_since: drive_delta
    share_link_create: drive_share

# Operations not implemented by this blade.
not_supported:
  file-storage-v1:
    - copy                  # Graph API supports it but not yet wired
    - append                # OneDrive does not support content append
    - folder_delete         # destructive folder ops deferred
    - share_link_delete     # not implemented

# Native tools not covered by the v1 contract.
native_tools:
  - drive_info
  - drive_versions
  - drive_thumbnail
  - drive_sites
  - drive_site_libraries
  - drive_site_list
  - drive_download
  - drive_permissions

install:
  runtime: uv
  package: onedrive-blade-mcp
  command: onedrive-blade-mcp

env:
  - name: ONEDRIVE_TENANT_ID
    description: "Azure AD tenant ID"
    secret: false
  - name: ONEDRIVE_CLIENT_ID
    description: "Azure AD app client ID"
    secret: true
  - name: ONEDRIVE_CLIENT_SECRET
    description: "Azure AD app client secret (optional)"
    secret: true
  - name: ONEDRIVE_AUTH_MODE
    description: "Auth mode: device_code or client_credentials"
    default: "device_code"
  - name: ONEDRIVE_WRITE_ENABLED
    description: "Enable write operations (upload, move, delete, share)"
    default: "false"

requires:
  stallari: ">=0.73.4"

conformance:
  file-storage-v1:
    required: "4/4"
    recommended: "3/4"
    optional: "2/3"
    gated: "1/3"
  last_tested: "2026-04-28"
